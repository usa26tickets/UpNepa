<html lang="en">

  <title>NEPA Dey! — Crowdsourced Grid Telemetry</title>
  
  <!-- Leaflet Maps CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --accent-neon: #10b981;
      --accent-dim: #047857;
      --alert-red: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-slate: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background-color: #0b1329;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-slate);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand h1 {
      font-size: 1.25rem;
      color: var(--accent-neon);
      letter-spacing: 0.5px;
    }

    .brand p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .main-container {
      display: flex;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      flex: 1;
      height: 100%;
      background: #0d1527;
    }

    .sidebar {
      width: 380px;
      background-color: #111c30;
      border-left: 1px solid var(--border-slate);
      display: flex;
      flex-direction: column;
      z-index: 10;
      overflow-y: auto;
    }

    .panel {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border-slate);
    }

    .panel-title {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .search-box {
      width: 100%;
      padding: 0.65rem 0.75rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border-slate);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }

    .search-box:focus {
      outline: 1px solid var(--accent-neon);
    }

    select {
      width: 100%;
      padding: 0.65rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border-slate);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .telemetry-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .btn {
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-upnepa {
      background-color: var(--accent-neon);
      color: #041e15;
    }

    .btn-nepadey {
      background-color: var(--alert-red);
      color: white;
    }

    .feed-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .feed-item {
      background-color: var(--card-bg);
      padding: 0.75rem;
      border-radius: 6px;
      border-left: 3px solid var(--border-slate);
      font-size: 0.85rem;
    }

    .feed-item.up { border-left-color: var(--accent-neon); }
    .feed-item.down { border-left-color: var(--alert-red); }

    .feed-meta {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 0.75rem;
      border-radius: 6px;
      text-align: center;
    }

    .stat-val {
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--text-main);
    }

    .stat-lbl {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      .sidebar { width: 100%; height: 350px; }
    }
  </style>
</head>

        </ul>
      </div>

    // Global App States
    let map;
    let gridState = {}; 
    const mapElements = {}; 

    // Initializing Engine Components
    document.addEventListener("DOMContentLoaded", () => {
      initMap();
      populateDropdown(ZONES);
      setupSearchEngine();
      seedMockTelemetry();
    });

    function initMap() {
      // Map configuration focused over central Lagos grid
      map = L.map('map', {
        zoomControl: true,
        maxZoom: 18,
        minZoom: 10
      }).setView([6.4542, 3.4241], 12);

      // Dark Mode Basemap Tiles Setup
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
      }).addTo(map);
    }

    function populateDropdown(zonesList) {
      const select = document.getElementById("zone-select");
      
      // Clean dynamic elements without breaking option placeholder
      select.innerHTML = '<option value="">-- Select or Search Zone --</option>';
      
      zonesList.forEach(z => {
        const opt = document.createElement("option");
        opt.value = z.id;
        opt.textContent = `${z.name} (${z.lga})`;
        select.appendChild(opt);
      });
    }

    function setupSearchEngine() {
      const searchBox = document.getElementById("zone-search");
      const select = document.getElementById("zone-select");

      searchBox.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase().trim();
        const filtered = ZONES.filter(z => 
          z.name.toLowerCase().includes(query) || 
          z.lga.toLowerCase().includes(query) ||
          z.area.toLowerCase().includes(query)
        );
        populateDropdown(filtered);
      });

      select.addEventListener("change", (e) => {
        const zoneId = e.target.value;
        if (!zoneId) return;
        const target = ZONES.find(z => z.id === zoneId);
        if (target) {
          map.flyTo([target.lat, target.lng], 14, { animate: true, duration: 1.5 });
        }
      });
    }

    function submitReport(statusBool) {
      const select = document.getElementById("zone-select");
      const targetZoneId = select.value;

      if (!targetZoneId) {
        alert("Please pick a target estate or landmark grid zone from the list first.");
        return;
      }

      executeTelemetryUpdate(targetZoneId, statusBool);
    }

    function executeTelemetryUpdate(zoneId, statusBool) {
      const target = ZONES.find(z => z.id === zoneId);
      if (!target) return;

      // Overwrite/Update state parameters
      gridState[zoneId] = {
        status: statusBool,
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
        count: (gridState[zoneId]?.count || 0) + 1
      };

      // Handle Map Elements Rendering Loop Safely
      if (mapElements[zoneId]) {
        map.removeLayer(mapElements[zoneId]);
      }

      const colorHex = statusBool ? "#10b981" : "#ef4444";
      
      const circleMarker = L.circle([target.lat, target.lng], {
        color: colorHex,
        fillColor: colorHex,
        fillOpacity: 0.35,
        radius: target.r,
        weight: 2
      });

      // Interactive Popup Binding
      circleMarker.bindPopup(`
        <div style="color:#111; font-family:sans-serif; font-size:13px;">
          <strong style="font-size:14px; color:#1e293b;">${target.name}</strong><br/>
          <span>LGA: ${target.lga}</span><br/>
          <hr style="margin: 6px 0; border:0; border-top:1px solid #ddd;"/>
          Status: <span style="font-weight:bold; color:${colorHex};">${statusBool ? '💡 UP NEPA' : '🔌 NEPA DEY'}</span><br/>
          <span style="font-size:11px; color:#64748b;">Telemetry Logs: ${gridState[zoneId].count} pings</span>
        </div>
      `);

      circleMarker.addTo(map);
      mapElements[zoneId] = circleMarker;

      // Update Dashboard Metrics and Live Feeds
      logFeedStream(target.name, statusBool, gridState[zoneId].timestamp);
      recalculateStats();
    }

    function logFeedStream(name, statusBool, timeStr) {
      const container = document.getElementById("feed-container");
      const li = document.createElement("li");
      
      li.className = `feed-item ${statusBool ? 'up' : 'down'}`;
      li.innerHTML = `
        <div><strong>${statusBool ? '💡 Up NEPA!' : '🔌 NEPA Dey'}</strong> &bull; ${name}</div>
        <div class="feed-meta"><span>Grid Confirmed</span><span>${timeStr}</span></div>
      `;

      container.insertBefore(li, container.firstChild);

      // Max capacity cap at 6 entries visually to avoid vertical panel blowout
      if (container.children.length > 6) {
        container.removeChild(container.lastChild);
      }
    }

    function recalculateStats() {
      const keys = Object.keys(gridState);
      if (keys.length === 0) return;

      const totalReports = keys.reduce((acc, k) => acc + gridState[k].count, 0);
      const onlineZonesCount = keys.filter(k => gridState[k].status === true).length;
      const pctOnline = Math.round((onlineZonesCount / keys.length) * 100);

      document.getElementById("stat-online-pct").textContent = `${pctOnline}%`;
      document.getElementById("stat-total-reports").textContent = totalReports;
    }

    function seedMockTelemetry() {
      // Seed initial telemetry indicators across major core hubs
      const mockSeeds = [
        { id: "vgc", state: true },
        { id: "lekki1", state: false },
        { id: "vi_1004", state: true },
        { id: "ikejaGRA", state: true },
        { id: "magodo2", state: false }
      ];

      mockSeeds.forEach(seed => {
        executeTelemetryUpdate(seed.id, seed.state);
      });
    }
