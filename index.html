<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridPulse Lagos – Live Power Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ── Reset & Base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --surface2:  #1e2130;
      --border:    #2a2d3a;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --on:        #22c55e;
      --on-glow:   rgba(34,197,94,0.18);
      --off:       #ef4444;
      --off-glow:  rgba(239,68,68,0.18);
      --warn:      #f59e0b;
      --accent:    #6366f1;
      --sidebar-w: 340px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }

    /* ── Layout ─────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 100;
    }

    /* header */
    #sidebar-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .brand-icon { font-size: 22px; line-height: 1; }
    .brand-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .brand-name span { color: var(--on); }

    /* stat pills */
    .stat-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .stat-pill {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; text-align: center;
    }
    .stat-pill .val { font-size: 18px; font-weight: 700; line-height: 1.2; }
    .stat-pill .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

    /* search */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 12px 9px 34px;
      color: var(--text); font-size: 13px; outline: none; transition: border .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap::before {
      content: "🔍"; position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); font-size: 13px; pointer-events: none;
    }

    /* zone list */
    #zone-list-wrap {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 7px;
    }
    #zone-list-wrap::-webkit-scrollbar { width: 4px; }
    #zone-list-wrap::-webkit-scrollbar-track { background: transparent; }
    #zone-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .zone-section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
      color: var(--muted); padding: 6px 4px 2px; font-weight: 600;
    }

    .zone-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .zone-card:hover { background: #252a38; border-color: #3a3f52; }
    .zone-card.active { border-color: var(--accent); }

    .zone-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .zone-dot.on  { background: var(--on);  box-shadow: 0 0 6px var(--on); }
    .zone-dot.off { background: var(--off); box-shadow: 0 0 6px var(--off); }
    .zone-dot.unk { background: var(--muted); }

    .zone-info { flex: 1; min-width: 0; }
    .zone-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .zone-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .zone-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px; letter-spacing: .4px; white-space: nowrap;
    }
    .badge-on  { background: var(--on-glow);  color: var(--on);  border: 1px solid var(--on); }
    .badge-off { background: var(--off-glow); color: var(--off); border: 1px solid var(--off); }
    .badge-unk { background: rgba(100,116,139,.15); color: var(--muted); border: 1px solid var(--muted); }

    /* ── Report Panel ───────────────────────────────────────── */
    #report-panel {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      flex-shrink: 0;
      background: var(--surface);
    }
    #report-panel h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }

    .report-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .report-select {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 12px; outline: none;
    }

    .report-btns { display: flex; gap: 8px; }
    .btn-report {
      flex: 1; padding: 9px 12px; border: none; border-radius: 9px;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .btn-report:active { transform: scale(.97); }
    .btn-on  { background: var(--on);  color: #000; }
    .btn-off { background: var(--off); color: #fff; }
    .btn-on:hover  { opacity: .9; }
    .btn-off:hover { opacity: .9; }

    /* telemetry toggles */
    .tele-row { display: flex; gap: 8px; margin-top: 8px; }
    .tele-btn {
      flex: 1; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 11px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; transition: .15s;
    }
    .tele-btn .tele-val { font-weight: 700; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    .tele-btn.ok  { border-color: rgba(34,197,94,.3); }
    .tele-btn.ok .tele-val  { background: var(--on-glow); color: var(--on); }
    .tele-btn.bad { border-color: rgba(239,68,68,.3); }
    .tele-btn.bad .tele-val { background: var(--off-glow); color: var(--off); }

    /* karma */
    .karma-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--muted); margin-top: 8px;
      padding-top: 8px; border-top: 1px solid var(--border);
    }
    .karma-val { font-weight: 700; color: var(--warn); font-size: 13px; }

    /* ── Map ────────────────────────────────────────────────── */
    #map { flex: 1; height: 100vh; }

    /* ── Toast ──────────────────────────────────────────────── */
    #toast {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 600;
      z-index: 9999; transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.green { border-color: var(--on); color: var(--on); }
    #toast.red   { border-color: var(--off); color: var(--off); }

    /* ── Activity Feed ──────────────────────────────────────── */
    #feed-panel {
      position: fixed; bottom: 18px; right: 18px;
      width: 280px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; z-index: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #feed-header {
      padding: 10px 14px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    #feed-header .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--on); box-shadow: 0 0 6px var(--on);
      animation: pulse 1.5s infinite;
    }
    #feed-body { max-height: 180px; overflow-y: auto; padding: 8px 0; }
    #feed-body::-webkit-scrollbar { width: 3px; }
    #feed-body::-webkit-scrollbar-thumb { background: var(--border); }
    .feed-item {
      padding: 6px 14px; font-size: 11px; color: var(--muted);
      border-bottom: 1px solid rgba(42,45,58,.5); line-height: 1.5;
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-item span { font-weight: 600; }
    .feed-item .feed-on  { color: var(--on); }
    .feed-item .feed-off { color: var(--off); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 700px) {
      #app { flex-direction: column; }
      #sidebar { width: 100%; min-width: unset; height: auto; max-height: 55vh; }
      #map { height: 45vh; }
      #feed-panel { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar">

    <div id="sidebar-header">
      <div class="brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">Grid<span>Pulse</span> Lagos</span>
      </div>

      <div class="stat-row">
        <div class="stat-pill">
          <div class="val" id="stat-on" style="color:var(--on)">—</div>
          <div class="lbl">Areas with light</div>
        </div>
        <div class="stat-pill">
          <div class="val" id="stat-off" style="color:var(--off)">—</div>
          <div class="lbl">Areas in blackout</div>
        </div>
        <div class="stat-pill">
          <div class="val" id="stat-unk" style="color:var(--muted)">—</div>
          <div class="lbl">Unknown</div>
        </div>
      </div>

      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search area or estate…" />
      </div>
    </div>

    <div id="zone-list-wrap">
      <!-- populated by JS -->
    </div>

    <!-- ── REPORT PANEL ── -->
    <div id="report-panel">
      <h3>📣 Report Your Area</h3>
      <div class="report-row">
        <select id="sel-zone" class="report-select"></select>
        <select id="sel-trust" class="report-select" style="max-width:120px">
          <option value="1.0">Verified (1.0)</option>
          <option value="0.4">New user (0.4)</option>
          <option value="0.1">Low trust (0.1)</option>
        </select>
      </div>
      <div class="report-btns">
        <button class="btn-report btn-on"  onclick="submitReport('light_on')">💡 NEPA Dey!</button>
        <button class="btn-report btn-off" onclick="submitReport('light_off')">🛑 No Light</button>
      </div>

      <div class="tele-row">
        <button class="tele-btn ok" id="btn-wifi" onclick="toggleTele('wifi')">
          <span>Wi-Fi</span><span class="tele-val" id="wifi-val">ON</span>
        </button>
        <button class="tele-btn ok" id="btn-charge" onclick="toggleTele('charge')">
          <span>Charging</span><span class="tele-val" id="charge-val">ON</span>
        </button>
      </div>

      <div class="karma-row">
        <span>Your contribution score</span>
        <span class="karma-val" id="karma">140 XP</span>
      </div>
    </div>
  </div>

  <!-- ── MAP ── -->
  <div id="map"></div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── ACTIVITY FEED ── -->
<div id="feed-panel">
  <div id="feed-header">
    <span>Live activity</span>
    <div class="live-dot"></div>
  </div>
  <div id="feed-body">
    <div class="feed-item">Waiting for first report…</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─────────────────────────────────────────────
//  DATA MODEL
// ─────────────────────────────────────────────
const ZONES = [
  // Island
  { id:"lekki1",    name:"Lekki Phase 1",    area:"Island",   lat:6.4446, lng:3.4736, radius:1200 },
  { id:"lekki2",    name:"Lekki Phase 2",    area:"Island",   lat:6.4339, lng:3.5388, radius:1100 },
  { id:"vi",        name:"Victoria Island",  area:"Island",   lat:6.4281, lng:3.4219, radius:1300 },
  { id:"ikoyi",     name:"Ikoyi",            area:"Island",   lat:6.4530, lng:3.4317, radius:1000 },
  { id:"ajah",      name:"Ajah",             area:"Island",   lat:6.4660, lng:3.5620, radius:1400 },
  { id:"sangotedo", name:"Sangotedo",        area:"Island",   lat:6.4419, lng:3.6020, radius:1100 },
  // Mainland
  { id:"yaba",      name:"Yaba",             area:"Mainland", lat:6.5161, lng:3.3858, radius:1100 },
  { id:"ikeja",     name:"Ikeja Allen Ave",  area:"Mainland", lat:6.5962, lng:3.3551, radius:1300 },
  { id:"ikejaGRA",  name:"Ikeja GRA",        area:"Mainland", lat:6.5828, lng:3.3516, radius:1000 },
  { id:"surulere",  name:"Surulere",         area:"Mainland", lat:6.4994, lng:3.3644, radius:1400 },
  { id:"ojodu",     name:"Ojodu Berger",     area:"Mainland", lat:6.6354, lng:3.3674, radius:1200 },
  { id:"ogba",      name:"Ogba",             area:"Mainland", lat:6.5979, lng:3.3283, radius:1200 },
  { id:"agege",     name:"Agege",            area:"Mainland", lat:6.6184, lng:3.3197, radius:1300 },
  { id:"maryland",  name:"Maryland",         area:"Mainland", lat:6.5663, lng:3.3519, radius:1000 },
  { id:"gbagada",   name:"Gbagada",          area:"Mainland", lat:6.5498, lng:3.3799, radius:1100 },
  { id:"kosofe",    name:"Kosofe",           area:"Mainland", lat:6.5748, lng:3.4006, radius:1200 },
];

// State per zone
const state = {};
ZONES.forEach(z => {
  state[z.id] = { netScore: 0, status: "unk", circle: null, lastReport: null };
});

const THRESHOLD   = 2.0;   // votes needed to flip status
const DECAY_MS    = 30 * 60 * 1000; // reports decay after 30 min (simulated as 30s for demo)
const DECAY_DEMO  = 30 * 1000;      // 30 seconds demo decay

let karma     = 140;
let telemetry = { wifi: true, charge: true };

// ─────────────────────────────────────────────
//  MAP SETUP
// ─────────────────────────────────────────────
const map = L.map('map').setView([6.5, 3.42], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 18
}).addTo(map);

// Colors
const C = {
  on:  { stroke:'#22c55e', fill:'#22c55e' },
  off: { stroke:'#ef4444', fill:'#ef4444' },
  unk: { stroke:'#64748b', fill:'#475569' },
};

function zoneColor(status) { return C[status] || C.unk; }

// Draw circles
ZONES.forEach(z => {
  const c = zoneColor('unk');
  const circle = L.circle([z.lat, z.lng], {
    color: c.stroke, fillColor: c.fill, fillOpacity: 0.25, radius: z.radius, weight: 1.5
  }).addTo(map);
  circle.bindPopup(''); // filled on click
  circle.on('click', () => openZonePopup(z.id));
  state[z.id].circle = circle;
});

function openZonePopup(id) {
  const z    = ZONES.find(x => x.id === id);
  const s    = state[id];
  const lbl  = s.status === 'on' ? '💡 Light is ON'
             : s.status === 'off' ? '🛑 No light (blackout)'
             : '❓ Status unknown';
  const ago  = s.lastReport ? timeAgo(s.lastReport) : 'No reports yet';
  const html = `
    <div style="font-family:-apple-system,sans-serif;font-size:13px;min-width:160px;">
      <b style="font-size:14px;">${z.name}</b><br>
      <span style="display:block;margin:6px 0 4px;">${lbl}</span>
      <span style="color:#888;font-size:11px;">Score: ${s.netScore.toFixed(1)} &nbsp;·&nbsp; ${ago}</span>
    </div>`;
  state[id].circle.setPopupContent(html).openPopup();
}

// ─────────────────────────────────────────────
//  SIDEBAR ZONE LIST
// ─────────────────────────────────────────────
function buildSidebar(filter = '') {
  const wrap    = document.getElementById('zone-list-wrap');
  const selZone = document.getElementById('sel-zone');
  wrap.innerHTML = '';
  selZone.innerHTML = '';

  const areas = [...new Set(ZONES.map(z => z.area))];
  areas.forEach(area => {
    const filtered = ZONES.filter(z =>
      z.area === area && z.name.toLowerCase().includes(filter.toLowerCase())
    );
    if (!filtered.length) return;

    const lbl = document.createElement('div');
    lbl.className = 'zone-section-label';
    lbl.textContent = area;
    wrap.appendChild(lbl);

    filtered.forEach(z => {
      const s      = state[z.id];
      const dotCls = s.status === 'on' ? 'on' : s.status === 'off' ? 'off' : 'unk';
      const badge  = s.status === 'on'  ? '<span class="zone-badge badge-on">Light On</span>'
                   : s.status === 'off' ? '<span class="zone-badge badge-off">Blackout</span>'
                   :                      '<span class="zone-badge badge-unk">Unknown</span>';
      const ago    = s.lastReport ? timeAgo(s.lastReport) : 'No reports';

      const card = document.createElement('div');
      card.className = 'zone-card';
      card.id = `card-${z.id}`;
      card.innerHTML = `
        <div class="zone-dot ${dotCls}"></div>
        <div class="zone-info">
          <div class="zone-name">${z.name}</div>
          <div class="zone-meta">${ago}</div>
        </div>
        ${badge}`;
      card.addEventListener('click', () => {
        map.setView([z.lat, z.lng], 14);
        openZonePopup(z.id);
      });
      wrap.appendChild(card);

      // Populate report dropdown
      const opt = document.createElement('option');
      opt.value = z.id;
      opt.textContent = z.name;
      selZone.appendChild(opt);
    });
  });
}

// Update a single card without rebuilding list
function refreshCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return buildSidebar(document.getElementById('search-input').value);
  const s      = state[id];
  const dotCls = s.status === 'on' ? 'on' : s.status === 'off' ? 'off' : 'unk';
  const badge  = s.status === 'on'  ? '<span class="zone-badge badge-on">Light On</span>'
               : s.status === 'off' ? '<span class="zone-badge badge-off">Blackout</span>'
               :                      '<span class="zone-badge badge-unk">Unknown</span>';
  const ago    = s.lastReport ? timeAgo(s.lastReport) : 'No reports';
  card.querySelector('.zone-dot').className = `zone-dot ${dotCls}`;
  card.querySelector('.zone-meta').textContent = ago;
  card.querySelector('.zone-badge') && (card.querySelector('.zone-badge').outerHTML = badge);
  card.innerHTML = `
    <div class="zone-dot ${dotCls}"></div>
    <div class="zone-info">
      <div class="zone-name">${ZONES.find(z=>z.id===id).name}</div>
      <div class="zone-meta">${ago}</div>
    </div>
    ${badge}`;
  card.addEventListener('click', () => {
    const z = ZONES.find(x => x.id === id);
    map.setView([z.lat, z.lng], 14);
    openZonePopup(id);
  });
}

// ─────────────────────────────────────────────
//  STATS BAR
// ─────────────────────────────────────────────
function updateStats() {
  const vals = Object.values(state);
  document.getElementById('stat-on').textContent  = vals.filter(s=>s.status==='on').length;
  document.getElementById('stat-off').textContent = vals.filter(s=>s.status==='off').length;
  document.getElementById('stat-unk').textContent = vals.filter(s=>s.status==='unk').length;
}

// ─────────────────────────────────────────────
//  CONSENSUS ENGINE
// ─────────────────────────────────────────────
function processVote(zoneId, vote, weight) {
  const s    = state[zoneId];
  const zone = ZONES.find(z => z.id === zoneId);
  const dir  = vote === 'light_on' ? 1 : -1;
  s.netScore += dir * weight;
  s.lastReport = new Date();

  const prev = s.status;
  if      (s.netScore >=  THRESHOLD) s.status = 'on';
  else if (s.netScore <= -THRESHOLD) s.status = 'off';
  else                               s.status = 'unk';

  // Update map circle
  const c = zoneColor(s.status);
  s.circle.setStyle({ color: c.stroke, fillColor: c.fill, fillOpacity: 0.3 });

  refreshCard(zoneId);
  updateStats();

  if (s.status !== prev && s.status !== 'unk') {
    const msg = s.status === 'on'
      ? `💡 Light confirmed in ${zone.name}!`
      : `🛑 Blackout reported in ${zone.name}`;
    showToast(msg, s.status === 'on' ? 'green' : 'red');
  }

  addFeedItem(zone.name, vote, weight);
}

// Schedule score decay (in demo: 30 s)
function scheduleDecay(zoneId, weight, direction) {
  setTimeout(() => {
    const s = state[zoneId];
    s.netScore -= direction * weight * 0.5; // partial decay
    const prev = s.status;
    if      (s.netScore >=  THRESHOLD) s.status = 'on';
    else if (s.netScore <= -THRESHOLD) s.status = 'off';
    else                               s.status = 'unk';
    if (s.status !== prev) {
      const c = zoneColor(s.status);
      s.circle.setStyle({ color: c.stroke, fillColor: c.fill, fillOpacity: 0.25 });
      refreshCard(zoneId);
      updateStats();
    }
  }, DECAY_DEMO);
}

// ─────────────────────────────────────────────
//  REPORT BUTTON
// ─────────────────────────────────────────────
function submitReport(vote) {
  const zoneId = document.getElementById('sel-zone').value;
  const weight = parseFloat(document.getElementById('sel-trust').value);
  if (!zoneId) return;

  processVote(zoneId, vote, weight);
  scheduleDecay(zoneId, weight, vote === 'light_on' ? 1 : -1);

  karma += weight >= 0.9 ? 10 : weight >= 0.3 ? 5 : 2;
  document.getElementById('karma').textContent = `${Math.round(karma)} XP`;
}

// ─────────────────────────────────────────────
//  TELEMETRY TOGGLES
// ─────────────────────────────────────────────
function toggleTele(type) {
  telemetry[type] = !telemetry[type];
  const btn = document.getElementById(`btn-${type}`);
  const val = document.getElementById(`${type}-val`);

  if (type === 'wifi') {
    val.textContent = telemetry.wifi ? 'ON' : 'OFF';
    btn.className = `tele-btn ${telemetry.wifi ? 'ok' : 'bad'}`;
  } else {
    val.textContent = telemetry.charge ? 'ON' : 'OFF';
    btn.className = `tele-btn ${telemetry.charge ? 'ok' : 'bad'}`;
  }

  // If both signals drop → implicit blackout signal
  if (!telemetry.wifi && !telemetry.charge) {
    const zoneId = document.getElementById('sel-zone').value;
    if (zoneId) {
      addFeedItem(ZONES.find(z=>z.id===zoneId).name, 'light_off', 0.4, true);
      processVote(zoneId, 'light_off', 0.4);
    }
  }
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, cls = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${cls}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 4000);
}

// ─────────────────────────────────────────────
//  ACTIVITY FEED
// ─────────────────────────────────────────────
function addFeedItem(zoneName, vote, weight, implicit = false) {
  const body  = document.getElementById('feed-body');
  const isOn  = vote === 'light_on';
  const icon  = isOn ? '💡' : '🛑';
  const cls   = isOn ? 'feed-on' : 'feed-off';
  const label = isOn ? 'Light On' : 'Blackout';
  const src   = implicit ? 'auto-detect' : `w=${weight}`;
  const now   = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  // Remove placeholder
  const placeholder = body.querySelector('.feed-item:only-child');
  if (placeholder && placeholder.textContent.includes('Waiting')) placeholder.remove();

  const item = document.createElement('div');
  item.className = 'feed-item';
  item.innerHTML = `${icon} <span class="${cls}">${label}</span> · ${zoneName} <span style="color:#888;float:right">${now}</span>`;
  body.insertBefore(item, body.firstChild);

  // keep max 20 items
  while (body.children.length > 20) body.removeChild(body.lastChild);
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60)  return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}
